version: "3.9"

services:
  backend:
    build: ./backend
    container_name: qs_backend
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=qs-jwt-secret-change-in-production
      - ADMIN_REGISTER_KEY=qs-admin-key-2026
      - DATABASE_URL=sqlite:///./quantumshield.db
    volumes:
      - qs_db:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_BACKEND_URL=http://localhost:8000
    container_name: qs_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  qs_db:
